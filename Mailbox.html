<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>メールボックス | 国家運営</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d1220;--s2:#121a2c;--s3:#192236;--s4:#1e2d40;
  --bd:#1e2d45;--bd2:#152035;
  --t1:#c8d8f0;--t2:#607898;--t3:#2e4260;
  --ag:#10b981;--ar:#ef4444;--ay:#f59e0b;--ap:#a855f7;--ac:#3b82f6;
  --uc:#3b82f6;--uc2:#1d4ed8;
  --hdr:52px;--tab:44px;
}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--t1);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Courier New',monospace;font-size:14px}

/* ── Loading / Toast ── */
#LOV{display:none;position:fixed;inset:0;z-index:3000;background:rgba(3,6,12,.9);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(4px)}
#LOV.on{display:flex}
.spin{width:38px;height:38px;border:3px solid var(--bd);border-top-color:var(--uc);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{color:var(--t2);font-size:11px;letter-spacing:2px}
.toast{position:fixed;top:calc(var(--hdr)+10px);left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(13,18,32,.97);color:var(--t1);
  padding:10px 20px;border-radius:22px;border:1px solid var(--bd);
  font-size:12px;z-index:2500;opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
  backdrop-filter:blur(8px)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--ag);color:var(--ag)}
.toast.er{border-color:var(--ar);color:var(--ar)}
.toast.wa{border-color:var(--ay);color:var(--ay)}

/* ── Header ── */
.hdr{height:var(--hdr);flex-shrink:0;z-index:200;
  background:rgba(7,9,15,.93);border-bottom:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;gap:8px;padding:0 12px;
  box-shadow:0 2px 16px rgba(0,0,0,.5)}
.hbk{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--t1);border-radius:8px;padding:7px 11px;font-family:inherit;
  font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s}
.hbk:active{background:rgba(255,255,255,.12)}
.hdr-flag{width:7px;height:30px;border-radius:3px;background:var(--uc);
  box-shadow:0 0 10px var(--uc);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-sub{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.hdr-nation{font-size:15px;font-weight:900;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-r{display:flex;gap:5px;flex-shrink:0}
.hbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--t2);border-radius:8px;padding:6px 10px;font-family:inherit;
  font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.hbtn:active{background:rgba(255,255,255,.1)}
.hbtn.purple{border-color:rgba(168,85,247,.3);color:#c084fc;background:rgba(168,85,247,.08)}
.hbtn.purple:active{background:rgba(168,85,247,.15)}
.hbtn.blue{border-color:rgba(59,130,246,.3);color:var(--uc);background:rgba(59,130,246,.08)}
.hbtn.blue:active{background:rgba(59,130,246,.15)}

/* ── Tabs ── */
.tabs{height:var(--tab);flex-shrink:0;display:flex;
  background:rgba(10,14,24,.96);border-bottom:1px solid rgba(255,255,255,.06)}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--t3);font-family:inherit;font-size:12px;letter-spacing:.5px;
  cursor:pointer;transition:color .18s,border-color .18s;padding-bottom:2px}
.tab.on{color:var(--uc);border-bottom-color:var(--uc)}
.tab-bdg{display:inline-flex;align-items:center;justify-content:center;
  min-width:17px;height:17px;padding:0 4px;border-radius:9px;
  background:var(--ar);color:#fff;font-size:9px;font-weight:700}
.tab-bdg:empty{display:none}

/* ── Mail List ── */
.mail-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:10px 12px 90px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.mail-list::-webkit-scrollbar{width:3px}
.mail-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.empty-box{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:56px 24px;color:var(--t3);gap:12px;text-align:center}
.empty-ring{width:52px;height:52px;border-radius:50%;border:2px solid var(--bd);
  display:flex;align-items:center;justify-content:center}
.empty-env{width:24px;height:16px;border:2px solid var(--t3);border-radius:2px;position:relative}
.empty-env::before{content:'';position:absolute;top:2px;left:2px;right:2px;height:2px;
  background:var(--t3);box-shadow:0 5px 0 var(--t3)}
.empty-txt{font-size:13px;letter-spacing:.5px}

.mail-card{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;
  padding:0;margin-bottom:8px;cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;display:flex}
.mail-card:active{background:var(--s2);transform:scale(.997)}
/* 左色ライン */
.mc-line{width:4px;flex-shrink:0;border-radius:4px 0 0 4px}
.mc-line.admin{background:var(--ar)}
.mc-line.all{background:var(--ay)}
.mc-line.org{background:var(--ap)}
.mc-line.personal{background:var(--ac)}
.mc-content{flex:1;min-width:0;padding:11px 13px}
.mc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;row-gap:3px}
.mc-from{font-size:12px;font-weight:700;color:var(--t1);flex-shrink:0}
.mc-to{font-size:9px;padding:2px 7px;border-radius:7px;border:1px solid;
  letter-spacing:.3px;flex-shrink:0;white-space:nowrap}
.mc-to.all{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.2);color:var(--ay)}
.mc-to.org{background:rgba(168,85,247,.07);border-color:rgba(168,85,247,.2);color:var(--ap)}
.mc-to.personal{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.2);color:var(--ac)}
.mc-time{margin-left:auto;font-size:10px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.mc-subj{font-size:13px;font-weight:700;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.mc-prev{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── FAB ── */
#FAB{position:fixed;right:16px;bottom:20px;z-index:100;
  width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--uc),var(--uc2));color:#fff;
  box-shadow:0 6px 22px rgba(59,130,246,.45);
  display:flex;align-items:center;justify-content:center;transition:all .2s}
#FAB:active{transform:scale(.92)}
.fab-pencil{width:22px;height:22px;position:relative}
.fab-pencil::before{content:'';position:absolute;
  top:2px;left:3px;width:14px;height:16px;
  background:#fff;border-radius:2px 6px 2px 2px;
  transform:rotate(45deg);transform-origin:bottom left;opacity:.92}
.fab-pencil::after{content:'';position:absolute;bottom:0;left:0;
  border:4px solid transparent;border-top:5px solid #fff;border-right:5px solid #fff;
  transform:rotate(45deg)}

/* ── Modals ── */
.mover{display:none;position:fixed;inset:0;z-index:800;background:rgba(3,6,12,.88);
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.mover.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);
  border-radius:14px 14px 0 0;width:100%;max-width:600px;max-height:90vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.7);animation:sup .26s cubic-bezier(.22,1,.36,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-handle{display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.m-hbar{width:36px;height:4px;background:var(--bd);border-radius:2px}
.m-hdr{padding:6px 16px 12px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-ttl{font-size:15px;font-weight:700;color:var(--t1)}
.m-cls{background:var(--s2);border:1px solid var(--bd);color:var(--t2);
  width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;
  font-family:inherit;display:flex;align-items:center;justify-content:center}
.m-body{flex:1;overflow-y:auto;padding:14px 16px 10px;-webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.m-body::-webkit-scrollbar{width:3px}
.m-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.m-foot{padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0;
  padding-bottom:max(10px,env(safe-area-inset-bottom,10px))}

/* Form */
.fl{display:block;font-size:9px;color:var(--t3);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:6px;margin-top:12px}
.fl:first-child{margin-top:0}
.finp{width:100%;background:var(--s2);border:1px solid var(--bd);
  color:var(--t1);padding:11px 14px;border-radius:10px;
  font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--uc);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.finp::placeholder{color:var(--t3)}
textarea.finp{resize:none;line-height:1.6;min-height:120px}
.fsel-w{position:relative}
.fsel{width:100%;background:var(--s2);border:1px solid var(--bd);
  color:var(--t1);padding:11px 40px 11px 14px;border-radius:10px;
  font-family:inherit;font-size:13px;outline:none;
  appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .2s}
.fsel:focus{border-color:var(--uc)}
.fsel-arr{position:absolute;right:13px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--t3);font-size:10px}
.char-c{text-align:right;font-size:10px;color:var(--t3);margin-top:4px}

.sbtn{width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;
  font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:0}
.sbtn-ac{background:linear-gradient(135deg,var(--uc),var(--uc2));color:#fff;
  box-shadow:0 4px 14px rgba(59,130,246,.25)}
.sbtn-ac:active{transform:scale(.98)}
.sbtn-ac:disabled{opacity:.45;cursor:not-allowed;transform:none}
.sbtn-pu{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;
  box-shadow:0 4px 14px rgba(168,85,247,.25)}
.sbtn-pu:active{transform:scale(.98)}
.sbtn-del{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:var(--ar)}
.sbtn-del:active{background:rgba(239,68,68,.14)}

/* Mail Detail */
.md-subj{font-size:17px;font-weight:900;color:#fff;margin-bottom:12px;line-height:1.4}
.md-meta{padding:10px 12px;background:var(--s2);border:1px solid var(--bd2);
  border-radius:10px;margin-bottom:12px}
.md-row{display:flex;gap:8px;margin-bottom:4px;font-size:12px;align-items:flex-start}
.md-row:last-child{margin-bottom:0}
.md-lbl{color:var(--t3);white-space:nowrap;min-width:32px;flex-shrink:0}
.md-val{color:var(--t1);word-break:break-all;flex:1}
.md-body{font-size:14px;color:var(--t1);line-height:1.75;white-space:pre-wrap;
  word-break:break-all;background:var(--s2);border:1px solid var(--bd2);
  border-radius:10px;padding:14px}

/* ── 組織管理モーダル ── */
/* セクション見出し */
.o-sec{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin:16px 0 8px}
.o-sec:first-child{margin-top:0}
.o-sec::after{content:'';flex:1;height:1px;background:var(--bd)}

/* 新規作成フォーム */
.o-create-row{display:flex;gap:6px;align-items:stretch}
.o-create-inp{flex:1;background:var(--s2);border:1px solid var(--bd);color:var(--t1);
  padding:11px 13px;border-radius:10px;font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.o-create-inp:focus{border-color:var(--ap);box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.o-create-inp::placeholder{color:var(--t3)}
.o-create-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;
  color:#fff;padding:11px 16px;border-radius:10px;font-family:inherit;
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 10px rgba(168,85,247,.25);transition:all .2s;flex-shrink:0}
.o-create-btn:active{transform:scale(.97)}

/* 組織カード */
.o-card{background:var(--s2);border:1px solid var(--bd2);border-radius:12px;
  padding:13px 14px;margin-bottom:10px}
.o-card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.o-card-name{font-size:14px;font-weight:700;color:var(--t1);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.o-card-creator{font-size:10px;color:var(--t3);letter-spacing:.3px;flex-shrink:0}
.o-del-btn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  color:var(--ar);font-family:inherit;font-size:10px;padding:4px 10px;
  border-radius:7px;cursor:pointer;letter-spacing:.5px;flex-shrink:0;transition:background .2s}
.o-del-btn:active{background:rgba(239,68,68,.16)}

/* メンバーチップ */
.o-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.o-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:14px;
  background:var(--s3);border:1px solid var(--bd);font-size:11px;color:var(--t1)}
.o-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.o-chip-rm{background:none;border:none;color:var(--t3);font-size:12px;
  cursor:pointer;padding:0 0 0 3px;font-family:inherit;line-height:1;transition:color .2s}
.o-chip-rm:hover{color:var(--ar)}
.o-no-member{font-size:11px;color:var(--t3);margin-bottom:8px;font-style:italic}

/* メンバー追加行 */
.o-add-row{display:flex;gap:6px}
.o-add-sel{flex:1;min-width:0;background:var(--s3);border:1px solid var(--bd);color:var(--t1);
  padding:8px 10px;border-radius:8px;font-family:inherit;font-size:12px;outline:none;
  appearance:none;-webkit-appearance:none;cursor:pointer}
.o-add-sel:focus{border-color:var(--ap)}
.o-add-btn{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);
  color:#c084fc;font-family:inherit;font-size:11px;font-weight:700;
  padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;
  transition:all .2s;flex-shrink:0}
.o-add-btn:active{background:rgba(168,85,247,.25)}

/* 自分を追加するボタン */
.o-join-btn{width:100%;margin-top:6px;padding:8px;border-radius:8px;
  background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
  color:var(--ag);font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;transition:background .2s}
.o-join-btn:active{background:rgba(16,185,129,.15)}

/* ── 組織一覧モーダル ── */
.ov-country-row{padding:11px 0;border-bottom:1px solid var(--bd2);
  display:flex;align-items:flex-start;gap:10px}
.ov-country-row:last-child{border-bottom:none}
.ov-cnt-left{display:flex;align-items:center;gap:7px;min-width:90px;flex-shrink:0}
.ov-cnt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ov-cnt-name{font-size:13px;font-weight:700;color:var(--t1)}
.ov-orgs{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.ov-org-tag{font-size:10px;padding:3px 8px;border-radius:8px;
  background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);color:#c084fc}
.ov-none{font-size:11px;color:var(--t3);font-style:italic}

/* GAS URL バナー */
#CFG{display:none;background:rgba(245,158,11,.1);border-bottom:1px solid rgba(245,158,11,.3);
  padding:8px 12px;align-items:center;gap:8px;font-size:11px;color:var(--ay);flex-shrink:0}
#CFG.on{display:flex}
#CFG input{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(245,158,11,.3);
  color:#fde68a;font-family:inherit;font-size:11px;padding:6px 10px;border-radius:6px;outline:none;min-width:0}
#CFG button{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.35);
  color:var(--ay);font-family:inherit;font-size:10px;padding:6px 10px;
  border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>

<div id="LOV" class="on"><div class="spin"></div><div class="ltxt" id="LOV_TXT">読込中...</div></div>
<div class="toast" id="TOAST"></div>

<!-- Header -->
<div class="hdr">
  <button class="hbk" onclick="history.back()">← 戻る</button>
  <div class="hdr-flag" id="H_FLAG"></div>
  <div class="hdr-info">
    <div class="hdr-sub">メールボックス</div>
    <div class="hdr-nation" id="H_NAME">--</div>
  </div>
  <div class="hdr-r">
    <button class="hbtn blue" onclick="openOrgView()">組織一覧</button>
    <button class="hbtn purple" onclick="openOrg()">組織管理</button>
  </div>
</div>

<!-- GAS URL バナー -->
<div id="CFG" class="on">
  <span style="flex-shrink:0;font-size:10px">GAS URL</span>
  <input type="text" id="CFG_IN" placeholder="https://script.google.com/macros/s/.../exec">
  <button onclick="saveUrl()">保存して読込</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab on" id="TAB_IN"  onclick="setTab('inbox')">
    受信箱 <span class="tab-bdg" id="INBOX_BDG"></span>
  </button>
  <button class="tab" id="TAB_OUT" onclick="setTab('sent')">送信済み</button>
</div>

<!-- Mail List -->
<div class="mail-list" id="MAIL_LIST">
  <div class="empty-box">
    <div class="empty-ring"><div class="empty-env"></div></div>
    <div class="empty-txt">読込中...</div>
  </div>
</div>

<!-- FAB 送信ボタン -->
<button id="FAB" onclick="openCompose()" title="新規メール">
  <div class="fab-pencil"></div>
</button>

<!-- ═══ メール詳細 ═══ -->
<div class="mover" id="M_DETAIL" onclick="if(event.target===this)mc('M_DETAIL')">
  <div class="modal">
    <div class="m-handle"><div class="m-hbar"></div></div>
    <div class="m-hdr"><div class="m-ttl">メール詳細</div>
      <button class="m-cls" onclick="mc('M_DETAIL')">X</button></div>
    <div class="m-body" id="DETAIL_BODY"></div>
    <div class="m-foot" id="DETAIL_FOOT"></div>
  </div>
</div>

<!-- ═══ 新規作成 ═══ -->
<div class="mover" id="M_COMPOSE" onclick="if(event.target===this)mc('M_COMPOSE')">
  <div class="modal">
    <div class="m-handle"><div class="m-hbar"></div></div>
    <div class="m-hdr"><div class="m-ttl">新規メール</div>
      <button class="m-cls" onclick="mc('M_COMPOSE')">X</button></div>
    <div class="m-body">
      <label class="fl">宛先</label>
      <div class="fsel-w">
        <select class="fsel" id="C_TO">
          <option value="">-- 宛先を選択 --</option>
          <option value="ALL">ALL（全員に送信）</option>
        </select>
        <span class="fsel-arr">▼</span>
      </div>
      <label class="fl">件名</label>
      <input type="text" class="finp" id="C_SUBJ" placeholder="件名を入力" maxlength="100">
      <label class="fl">本文</label>
      <textarea class="finp" id="C_BODY" placeholder="本文を入力..." maxlength="2000" rows="6"
        oninput="document.getElementById('C_CHAR').textContent=this.value.length+' / 2000'"></textarea>
      <div class="char-c" id="C_CHAR">0 / 2000</div>
    </div>
    <div class="m-foot">
      <button class="sbtn sbtn-ac" id="SEND_BTN" onclick="doSend()">送信する</button>
    </div>
  </div>
</div>

<!-- ═══ 組織管理（全員） ═══ -->
<div class="mover" id="M_ORG" onclick="if(event.target===this)mc('M_ORG')">
  <div class="modal">
    <div class="m-handle"><div class="m-hbar"></div></div>
    <div class="m-hdr"><div class="m-ttl">組織管理</div>
      <button class="m-cls" onclick="mc('M_ORG')">X</button></div>
    <div class="m-body" id="ORG_BODY"></div>
  </div>
</div>

<!-- ═══ 組織一覧 ═══ -->
<div class="mover" id="M_OV" onclick="if(event.target===this)mc('M_OV')">
  <div class="modal">
    <div class="m-handle"><div class="m-hbar"></div></div>
    <div class="m-hdr"><div class="m-ttl">組織所属一覧</div>
      <button class="m-cls" onclick="mc('M_OV')">X</button></div>
    <div class="m-body" id="OV_BODY"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  設定
// ════════════════════════════════════════════════════
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyV4MwHFGrthrXfQe30SvxFADgZ1qQeOyI8k4_gFs2mjYQNtY3oAvpdtb_WedmfUPnn/exec';
var LS_URL  = 'mail_gas_url';
var LS_SES  = 'home_session';
var ADMIN_PW= '03280317';

var SESSION  = null;
var COUNTRIES= [];
var COLORS   = {};
var ORGS     = [];
var BOX      = 'inbox';
var MAILS    = [];
var DETAIL_M = null;

// ════════════════════════════════════════════════════
//  起動
// ════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function(){
  var sv=localStorage.getItem(LS_URL); if(sv) GAS_URL=sv;
  try{var s=sessionStorage.getItem(LS_SES);if(s)SESSION=JSON.parse(s);}catch(e){}
  if(!SESSION){
    hideLoading();toast('home.htmlからログインしてください','er');
    setTimeout(function(){location.href='home.html';},2000);return;
  }
  var c=SESSION.color||'#3b82f6';
  document.getElementById('H_NAME').textContent=SESSION.country;
  document.getElementById('H_FLAG').style.cssText='background:'+c+';box-shadow:0 0 10px '+c;
  document.documentElement.style.setProperty('--uc',c);
  document.documentElement.style.setProperty('--uc2',darken(c,.28));

  if(!GAS_URL.trim()){
    document.getElementById('CFG').classList.add('on');
    hideLoading();return;
  }
  document.getElementById('CFG').classList.remove('on');
  initLoad();
});

function saveUrl(){
  var v=document.getElementById('CFG_IN').value.trim();
  if(!v){toast('URLを入力してください','er');return;}
  GAS_URL=v;localStorage.setItem(LS_URL,v);
  document.getElementById('CFG').classList.remove('on');
  initLoad();
}

function initLoad(){
  showLoading('読込中...');
  Promise.all([
    fetch(GAS_URL+'?action=getCountries').then(function(r){return r.json();}).catch(function(){return null;}),
    fetch(GAS_URL+'?action=getOrgs').then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(rs){
    if(rs[0]&&rs[0].success){COUNTRIES=rs[0].countries||[];COLORS=rs[0].colors||{};}
    if(rs[1]&&rs[1].success){ORGS=rs[1].orgs||[];}
    buildComposeOptions();
    return fetchMails();
  }).then(function(){hideLoading();}).catch(function(e){hideLoading();toast('初期化エラー: '+e,'er');});
}

// ════════════════════════════════════════════════════
//  タブ切替
// ════════════════════════════════════════════════════
function setTab(box){
  BOX=box;
  document.getElementById('TAB_IN').classList.toggle('on',box==='inbox');
  document.getElementById('TAB_OUT').classList.toggle('on',box==='sent');
  showLoading('読込中...');
  fetchMails().then(function(){hideLoading();}).catch(function(e){hideLoading();toast('エラー: '+e,'er');});
}

// ════════════════════════════════════════════════════
//  メール取得
// ════════════════════════════════════════════════════
function fetchMails(){
  if(!GAS_URL||!SESSION) return Promise.resolve();
  return fetch(GAS_URL+'?action=getMails&country='+encodeURIComponent(SESSION.country)+'&box='+BOX)
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||!d.success){toast(d?d.error:'取得失敗','er');return;}
      MAILS=d.mails||[];
      renderList(MAILS);
      if(BOX==='inbox'){
        var b=document.getElementById('INBOX_BDG');
        b.textContent=MAILS.length>0?MAILS.length:'';
      }
    }).catch(function(e){toast('通信エラー','er');});
}

function loadMails(){
  showLoading('更新中...');
  fetchMails().then(function(){hideLoading();});
}

// ════════════════════════════════════════════════════
//  メールリスト描画
// ════════════════════════════════════════════════════
function toType(to){
  if(to==='ALL') return 'all';
  if(ORGS.some(function(o){return o.name===to;})) return 'org';
  return 'personal';
}

function renderList(mails){
  var el=document.getElementById('MAIL_LIST');
  if(!mails.length){
    el.innerHTML='<div class="empty-box">'+
      '<div class="empty-ring"><div class="empty-env"></div></div>'+
      '<div class="empty-txt">'+(BOX==='inbox'?'受信メールなし':'送信済みメールなし')+'</div></div>';
    return;
  }
  var h='';
  mails.forEach(function(m,i){
    var tt=toType(m.to);
    var toLabel=m.to==='ALL'?'ALL':tt==='org'?'[組]'+m.to:m.to;
    var lineClass=m.from==='運営'?'admin':tt==='all'?'all':tt==='org'?'org':'personal';
    var displayFrom=BOX==='sent'?'→ '+m.to:m.from;
    var prev=m.body.replace(/\n/g,' ').substring(0,55)+(m.body.length>55?'…':'');
    var ts=m.ts.replace(/^\d{4}\//,'');
    h+='<div class="mail-card" onclick="openDetail('+i+')">'+
      '<div class="mc-line '+lineClass+'"></div>'+
      '<div class="mc-content">'+
        '<div class="mc-top">'+
          '<span class="mc-from">'+esc(displayFrom)+'</span>'+
          '<span class="mc-to '+tt+'">'+esc(toLabel)+'</span>'+
          '<span class="mc-time">'+esc(ts)+'</span>'+
        '</div>'+
        '<div class="mc-subj">'+esc(m.subject)+'</div>'+
        '<div class="mc-prev">'+esc(prev)+'</div>'+
      '</div></div>';
  });
  el.innerHTML=h;
}

// ════════════════════════════════════════════════════
//  メール詳細
// ════════════════════════════════════════════════════
function openDetail(i){
  var m=MAILS[i];if(!m)return;
  DETAIL_M=m;
  var tt=toType(m.to);
  var toLabel=m.to==='ALL'?'ALL（全員）':tt==='org'?'組織: '+m.to:m.to;
  document.getElementById('DETAIL_BODY').innerHTML=
    '<div class="md-subj">'+esc(m.subject)+'</div>'+
    '<div class="md-meta">'+
      '<div class="md-row"><span class="md-lbl">From</span><span class="md-val">'+esc(m.from)+'</span></div>'+
      '<div class="md-row"><span class="md-lbl">To</span><span class="md-val">'+esc(toLabel)+'</span></div>'+
      '<div class="md-row"><span class="md-lbl">日時</span><span class="md-val">'+esc(m.ts)+'</span></div>'+
    '</div>'+
    '<div class="md-body">'+esc(m.body)+'</div>';
  var foot=document.getElementById('DETAIL_FOOT');
  if(SESSION&&SESSION.isAdmin){
    foot.innerHTML='<div style="display:flex;gap:8px">'+
      '<button class="sbtn sbtn-del" style="flex:1" onclick="doDelete('+m.rowNum+')">削除</button>'+
      '<button class="sbtn sbtn-ac" style="flex:2" onclick="openReply()">返信</button>'+
      '</div>';
  } else {
    foot.innerHTML='<button class="sbtn sbtn-ac" onclick="openReply()">返信する</button>';
  }
  mo('M_DETAIL');
}

function doDelete(rowNum){
  if(!confirm('このメールを削除しますか？'))return;
  mc('M_DETAIL');showLoading('削除中...');
  fetch(GAS_URL+'?action=deleteMail&rowNum='+rowNum+'&adminPW='+encodeURIComponent(ADMIN_PW))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(d&&d.success){toast('削除しました','ok');loadMails();}
      else toast(d?d.error:'削除エラー','er');
    }).catch(function(e){hideLoading();toast('通信エラー','er');});
}

function openReply(){
  if(!DETAIL_M)return;
  mc('M_DETAIL');
  document.getElementById('C_TO').value=DETAIL_M.from;
  document.getElementById('C_SUBJ').value='Re: '+DETAIL_M.subject;
  document.getElementById('C_BODY').value='';
  document.getElementById('C_CHAR').textContent='0 / 2000';
  mo('M_COMPOSE');
}

// ════════════════════════════════════════════════════
//  新規作成
// ════════════════════════════════════════════════════
function buildComposeOptions(){
  var sel=document.getElementById('C_TO');
  // ALL以外を削除して再構築
  while(sel.options.length>1) sel.remove(1);
  var allOpt=document.createElement('option');
  allOpt.value='ALL';allOpt.textContent='ALL（全員）';
  sel.add(allOpt);
  // 組織グループ
  if(ORGS.length){
    var og=document.createElement('optgroup');og.label='── 組織 ──';
    ORGS.forEach(function(o){
      var opt=document.createElement('option');
      opt.value=o.name;opt.textContent='[組織] '+o.name+'（'+o.members.length+'国）';
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }
  // 個人グループ
  var pg=document.createElement('optgroup');pg.label='── 個人 ──';
  COUNTRIES.forEach(function(c){
    if(c===SESSION.country)return;
    var opt=document.createElement('option');opt.value=c;opt.textContent=c;
    pg.appendChild(opt);
  });
  sel.appendChild(pg);
}

function openCompose(){
  document.getElementById('C_TO').value='';
  document.getElementById('C_SUBJ').value='';
  document.getElementById('C_BODY').value='';
  document.getElementById('C_CHAR').textContent='0 / 2000';
  mo('M_COMPOSE');
}

function doSend(){
  if(!SESSION)return;
  var to  =document.getElementById('C_TO').value;
  var subj=document.getElementById('C_SUBJ').value.trim();
  var body=document.getElementById('C_BODY').value.trim();
  if(!to){toast('宛先を選択してください','wa');return;}
  if(!subj){toast('件名を入力してください','wa');return;}
  if(!body){toast('本文を入力してください','wa');return;}
  var btn=document.getElementById('SEND_BTN');
  btn.disabled=true;btn.textContent='送信中...';
  showLoading('送信中...');
  var url=GAS_URL+'?action=sendMail'+
    '&from='+encodeURIComponent(SESSION.country)+
    '&to='+encodeURIComponent(to)+
    '&subject='+encodeURIComponent(subj)+
    '&body='+encodeURIComponent(body);
  fetch(url).then(function(r){return r.json();}).then(function(d){
    hideLoading();btn.disabled=false;btn.textContent='送信する';
    if(d&&d.success){toast('送信しました','ok');mc('M_COMPOSE');setTab('sent');}
    else toast(d?d.error:'送信エラー','er');
  }).catch(function(e){hideLoading();btn.disabled=false;btn.textContent='送信する';toast('通信エラー','er');});
}

// ════════════════════════════════════════════════════
//  組織管理（全員利用可）
// ════════════════════════════════════════════════════
function openOrg(){
  renderOrgBody();
  mo('M_ORG');
}

function renderOrgBody(){
  var b=document.getElementById('ORG_BODY');
  var me=SESSION.country;
  var h='';

  // 新規組織作成
  h+='<div class="o-sec">新しい組織を作成</div>';
  h+='<div class="o-create-row">'+
    '<input type="text" class="o-create-inp" id="NEW_ORG_NM" placeholder="組織名を入力（30文字以内）" maxlength="30">'+
    '<button class="o-create-btn" onclick="doCreateOrg()">作成</button>'+
    '</div>'+
    '<div style="font-size:10px;color:var(--t3);margin-top:6px">作成者は自動的にメンバーに追加されます</div>';

  // 既存組織一覧
  h+='<div class="o-sec">組織一覧（'+ORGS.length+'件）</div>';

  if(!ORGS.length){
    h+='<div style="color:var(--t3);font-size:12px;text-align:center;padding:24px">組織はまだありません</div>';
  } else {
    ORGS.forEach(function(o,oi){
      var isMember=o.members.indexOf(me)!==-1;
      var isCreator=o.creator===me;
      var isAdmin=SESSION.isAdmin;
      var canDelete=isCreator||isAdmin;

      h+='<div class="o-card">';
      // カードヘッダー
      h+='<div class="o-card-top">'+
        '<span class="o-card-name">'+esc(o.name)+'</span>'+
        '<span class="o-card-creator">作成: '+esc(o.creator)+'</span>';
      if(canDelete){
        h+='<button class="o-del-btn" onclick="doDeleteOrg(\''+escj(o.name)+'\')">削除</button>';
      }
      h+='</div>';

      // メンバーチップ
      if(!o.members.length){
        h+='<div class="o-no-member">メンバーなし</div>';
      } else {
        h+='<div class="o-chips">';
        o.members.forEach(function(m){
          var col=COLORS[m]||'#334455';
          var canRm=isCreator||isAdmin||(m===me);
          h+='<div class="o-chip">'+
            '<div class="o-chip-dot" style="background:'+esc(col)+'"></div>'+
            esc(m)+
            (canRm?'<button class="o-chip-rm" onclick="doRemoveMember(\''+escj(o.name)+'\',\''+escj(m)+'\')">x</button>':'')+
            '</div>';
        });
        h+='</div>';
      }

      // メンバー追加
      var nonMembers=COUNTRIES.filter(function(c){return o.members.indexOf(c)===-1;});
      if(nonMembers.length){
        h+='<div class="o-add-row">'+
          '<select class="o-add-sel" id="ADD_'+oi+'">'+
          '<option value="">追加する国を選択</option>';
        nonMembers.forEach(function(c){
          h+='<option value="'+esc(c)+'">'+esc(c)+'</option>';
        });
        h+='</select>'+
          '<button class="o-add-btn" onclick="doAddMember(\''+escj(o.name)+'\','+oi+')">追加</button>'+
          '</div>';
      }

      // 自分が未参加なら参加ボタン
      if(!isMember){
        h+='<button class="o-join-btn" onclick="doJoinOrg(\''+escj(o.name)+'\')">この組織に参加する</button>';
      }

      h+='</div>'; // o-card
    });
  }

  b.innerHTML=h;
}

function doCreateOrg(){
  var name=document.getElementById('NEW_ORG_NM').value.trim();
  if(!name){toast('組織名を入力してください','wa');return;}
  showLoading('作成中...');
  fetch(GAS_URL+'?action=createOrg&orgName='+encodeURIComponent(name)+'&creator='+encodeURIComponent(SESSION.country))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(d&&d.success){toast('「'+name+'」を作成しました','ok');return refreshOrgs();}
      else toast(d?d.error:'作成エラー','er');
    }).catch(function(e){hideLoading();toast('通信エラー','er');});
}

function doDeleteOrg(orgName){
  if(!confirm('「'+orgName+'」を削除しますか？\nこの組織宛のメール履歴は残ります。'))return;
  showLoading('削除中...');
  var pw=SESSION.isAdmin?ADMIN_PW:'';
  fetch(GAS_URL+'?action=deleteOrg&orgName='+encodeURIComponent(orgName)+
    '&requester='+encodeURIComponent(SESSION.country)+'&adminPW='+encodeURIComponent(pw))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(d&&d.success){toast('削除しました','ok');return refreshOrgs();}
      else toast(d?d.error:'削除エラー','er');
    }).catch(function(e){hideLoading();toast('通信エラー','er');});
}

function doJoinOrg(orgName){
  doAddMemberDirect(orgName, SESSION.country);
}

function doAddMember(orgName, selIdx){
  var sel=document.getElementById('ADD_'+selIdx);
  var c=sel?sel.value:'';
  if(!c){toast('国家を選択してください','wa');return;}
  doAddMemberDirect(orgName, c);
}

function doAddMemberDirect(orgName, country){
  showLoading('追加中...');
  fetch(GAS_URL+'?action=addMember&orgName='+encodeURIComponent(orgName)+'&country='+encodeURIComponent(country))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(d&&d.success){toast(country+'を追加しました','ok');return refreshOrgs();}
      else toast(d?d.error:'追加エラー','er');
    }).catch(function(e){hideLoading();toast('通信エラー','er');});
}

function doRemoveMember(orgName, country){
  if(!confirm('「'+country+'」を「'+orgName+'」から除外しますか？'))return;
  showLoading('除外中...');
  var pw=SESSION.isAdmin?ADMIN_PW:'';
  fetch(GAS_URL+'?action=removeMember&orgName='+encodeURIComponent(orgName)+
    '&country='+encodeURIComponent(country)+
    '&requester='+encodeURIComponent(SESSION.country)+
    '&adminPW='+encodeURIComponent(pw))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(d&&d.success){toast(country+'を除外しました','ok');return refreshOrgs();}
      else toast(d?d.error:'除外エラー','er');
    }).catch(function(e){hideLoading();toast('通信エラー','er');});
}

function refreshOrgs(){
  return fetch(GAS_URL+'?action=getOrgs')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&d.success){ORGS=d.orgs||[];buildComposeOptions();renderOrgBody();}
    });
}

// ════════════════════════════════════════════════════
//  組織一覧モーダル（国家ごとに所属組織を表示）
// ════════════════════════════════════════════════════
function openOrgView(){
  var b=document.getElementById('OV_BODY');

  // 国家ごとの所属組織マップを構築
  var cntOrgMap={};
  COUNTRIES.forEach(function(c){cntOrgMap[c]=[];});
  ORGS.forEach(function(o){
    o.members.forEach(function(m){
      if(cntOrgMap[m]) cntOrgMap[m].push(o.name);
    });
  });

  var h='';

  // 組織名一覧（上部サマリー）
  h+='<div style="font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;'+
    'display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
    '<span>全組織一覧</span>'+
    '<span style="flex:1;height:1px;background:var(--bd);display:block"></span>'+
    '</div>';
  if(ORGS.length){
    h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">';
    ORGS.forEach(function(o){
      h+='<div style="padding:4px 10px;border-radius:10px;font-size:11px;'+
        'background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);color:#c084fc">'+
        esc(o.name)+'（'+o.members.length+'国）</div>';
    });
    h+='</div>';
  } else {
    h+='<div style="color:var(--t3);font-size:12px;margin-bottom:16px">組織なし</div>';
  }

  // 国家ごとの所属組織
  h+='<div style="font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;'+
    'display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
    '<span>国家別所属</span>'+
    '<span style="flex:1;height:1px;background:var(--bd);display:block"></span>'+
    '</div>';

  COUNTRIES.forEach(function(c){
    var col=COLORS[c]||'#334455';
    var orgs=cntOrgMap[c]||[];
    h+='<div class="ov-country-row">'+
      '<div class="ov-cnt-left">'+
        '<div class="ov-cnt-dot" style="background:'+esc(col)+';box-shadow:0 0 6px '+esc(col)+'"></div>'+
        '<div class="ov-cnt-name">'+esc(c)+'</div>'+
      '</div>'+
      '<div class="ov-orgs">';
    if(!orgs.length){
      h+='<span class="ov-none">なし</span>';
    } else {
      orgs.forEach(function(on){h+='<span class="ov-org-tag">'+esc(on)+'</span>';});
    }
    h+='</div></div>';
  });

  b.innerHTML=h;
  mo('M_OV');
}

// ════════════════════════════════════════════════════
//  ユーティリティ
// ════════════════════════════════════════════════════
function mo(id){document.getElementById(id).classList.add('on');}
function mc(id){document.getElementById(id).classList.remove('on');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escj(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}
function darken(hex,a){
  hex=(hex||'#3b82f6').replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=Math.max(0,Math.round(parseInt(hex.substr(0,2),16)*(1-a)));
  var g=Math.max(0,Math.round(parseInt(hex.substr(2,2),16)*(1-a)));
  var b=Math.max(0,Math.round(parseInt(hex.substr(4,2),16)*(1-a)));
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}
function showLoading(t){document.getElementById('LOV_TXT').textContent=t||'読込中...';document.getElementById('LOV').classList.add('on');}
function hideLoading(){document.getElementById('LOV').classList.remove('on');}
var _tt;
function toast(msg,type){
  var el=document.getElementById('TOAST');el.textContent=msg;
  el.className='toast on '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='toast';},3500);
}
</script>
