<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ステート政策 | 国家運営</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d1220;--s2:#121a2c;--s3:#192236;
  --bd:#1e2d45;--bd2:#152035;
  --t1:#c8d8f0;--t2:#607898;--t3:#2e4260;
  --ag:#10b981;--ar:#ef4444;--ay:#f59e0b;--ap:#a855f7;
  --uc:#3b82f6;--uc2:#1d4ed8;
  --hdr:52px;--mbar:62px;
}
html{height:100%;touch-action:none}
body{display:flex;flex-direction:column;height:100%;
  background:var(--bg);color:var(--t1);overflow:hidden;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Courier New',monospace;
  font-size:14px}

/* Loading / Toast */
#LOV{display:none;position:fixed;inset:0;background:rgba(3,6,12,.9);z-index:3000;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  backdrop-filter:blur(4px)}
#LOV.on{display:flex}
.spin{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--uc);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{color:var(--t2);font-size:11px;letter-spacing:2px}
.toast{position:fixed;bottom:calc(var(--mbar) + 14px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(13,18,32,.97);color:var(--t1);
  padding:10px 20px;border-radius:22px;border:1px solid var(--bd);
  font-size:13px;z-index:2500;opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
  backdrop-filter:blur(8px)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--ag);color:var(--ag)}
.toast.er{border-color:var(--ar);color:var(--ar)}
.toast.wa{border-color:var(--ay);color:var(--ay)}

/* Header */
.hdr{height:var(--hdr);flex-shrink:0;z-index:200;
  background:rgba(7,9,15,.93);border-bottom:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;gap:10px;padding:0 12px;
  box-shadow:0 2px 16px rgba(0,0,0,.5)}
.hdr-back{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--t1);border-radius:8px;padding:7px 11px;
  font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:.5px;
  white-space:nowrap;flex-shrink:0;transition:background .2s}
.hdr-back:active{background:rgba(255,255,255,.12)}
.hdr-flag{width:7px;height:30px;border-radius:3px;background:var(--uc);
  box-shadow:0 0 10px var(--uc);flex-shrink:0;transition:background .5s,box-shadow .5s}
.hdr-info{flex:1;min-width:0}
.hdr-sub{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.hdr-nation{font-size:16px;font-weight:900;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-r{display:flex;gap:5px;flex-shrink:0}
.hdr-sm{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--t2);border-radius:8px;padding:6px 10px;
  font-family:inherit;font-size:11px;cursor:pointer;transition:background .2s}
.hdr-sm:active{background:rgba(255,255,255,.1)}

/* Mode Banner */
#MODE_BANNER{flex-shrink:0;min-height:28px;display:flex;align-items:center;gap:7px;
  padding:3px 12px;font-size:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
  background:rgba(7,9,15,.82);backdrop-filter:blur(8px)}
.mb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px currentColor}
.mb-lbl{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:10px}
.mb-hint{color:var(--t3);font-size:9px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-leg{display:flex;align-items:center;gap:5px;flex-shrink:0}
.lg-item{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--t3)}
.lg-b{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lg-r{width:9px;height:9px;border-radius:2px;border:2px solid;flex-shrink:0;background:transparent}

/* Map */
#MVP{flex:1;overflow:hidden;position:relative;background:#060a10;
  touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
#MVP:active{cursor:grabbing}
#MT{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#MT svg{display:block;background:#060a10!important}
#MT path{cursor:pointer}

/* Selection Bar */
#SEL_BAR{flex-shrink:0;display:none;
  background:rgba(10,16,30,.96);border-top:1px solid var(--bd);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#SEL_BAR.on{display:block}
.sel-inner{padding:7px 12px 5px}
.sel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sel-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.sel-bdg{font-size:11px;padding:2px 10px;border-radius:12px;
  border:1px solid rgba(59,130,246,.3);background:rgba(59,130,246,.08);color:var(--uc)}
.sel-chips{display:flex;flex-wrap:wrap;gap:5px;max-height:54px;
  overflow-y:auto;margin-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sel-chips::-webkit-scrollbar{display:none}
.sel-chip{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;
  font-size:11px;border:1px solid rgba(59,130,246,.2);background:rgba(59,130,246,.07);color:var(--t1)}
.sel-chip-n{font-weight:700;color:var(--ap);font-size:12px}
.sel-chip-x{background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;
  padding:0 2px;font-family:inherit;line-height:1}
.sel-acts{display:flex;gap:7px;padding-bottom:max(6px,env(safe-area-inset-bottom,6px))}
.sbtn{padding:10px;border-radius:10px;font-family:inherit;font-size:12px;
  font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .2s;border:none}
.sbtn-cl{flex:1;background:var(--s2);color:var(--t2);border:1px solid var(--bd)}
.sbtn-cl:active{background:var(--s3)}
.sbtn-ok{flex:2;color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.22)}
.sbtn-ok:active{transform:scale(.98)}
.sbtn-ok:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* Mode Bar */
#MODE_BAR{height:var(--mbar);flex-shrink:0;display:flex;
  background:rgba(7,9,15,.96);border-top:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding-bottom:max(0px,env(safe-area-inset-bottom,0px))}
.mbn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;border-top:2px solid transparent;
  color:var(--t3);cursor:pointer;padding:5px 2px 0;
  font-family:inherit;font-size:8px;letter-spacing:.3px;text-transform:uppercase;
  -webkit-tap-highlight-color:transparent;transition:color .18s,border-color .18s}
.mbn.active{color:var(--uc);border-top-color:var(--uc)}
.mbn-ico{width:20px;height:20px;flex-shrink:0;position:relative}

/* Modals */
.mover{display:none;position:fixed;inset:0;background:rgba(3,6,12,.88);z-index:900;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.mover.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);
  border-radius:14px 14px 0 0;width:100%;max-width:560px;max-height:86vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.65);animation:sup .26s cubic-bezier(.22,1,.36,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-hd{display:flex;justify-content:center;padding:10px 0 4px}
.m-hbar{width:36px;height:4px;background:var(--bd);border-radius:2px}
.m-header{padding:8px 16px 12px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.m-ttl{font-size:15px;font-weight:700;color:var(--t1)}
.m-cls{background:var(--s2);border:1px solid var(--bd);color:var(--t2);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  font-size:14px;font-family:inherit;display:flex;align-items:center;justify-content:center}
.m-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}

/* Info Modal */
.ih{display:flex;align-items:center;gap:9px;padding:10px 12px;
  background:var(--s2);border:1px solid var(--bd2);border-radius:10px;margin-bottom:10px}
.ih-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ih-cnt{font-size:13px;font-weight:700;color:var(--t1)}
.ih-own{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid;letter-spacing:.5px}
.ih-own.o{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.22);color:var(--ag)}
.ih-own.t{background:rgba(96,120,152,.07);border-color:rgba(96,120,152,.18);color:var(--t2)}
.ic{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ict{font-size:10px;padding:3px 9px;border-radius:9px;border:1px solid;font-weight:700}
.ict.ec{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.22);color:var(--ay)}
.ict.do{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.22);color:var(--uc)}
.ict.sp{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.22);color:var(--ar)}
.ict.d0{background:rgba(30,45,69,.5);border-color:var(--bd);color:var(--t3)}
.ict.dg{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.22);color:var(--ag)}
.ict.dy{background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.22);color:var(--ay)}
.ict.pt{background:rgba(59,130,246,.07);border-color:rgba(59,130,246,.22);color:var(--uc)}
.isec{font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin:12px 0 8px}
.isec::after{content:'';flex:1;height:1px;background:var(--bd)}
.igrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.igc{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:8px 10px}
.igc-l{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.igc-v{font-size:13px;font-weight:700;color:var(--t1);word-break:break-all}
.iind{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.iindr{display:flex;align-items:center;gap:6px;padding:7px 10px;
  border-radius:8px;font-size:11px}
.iindr.on{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);color:var(--ag)}
.iindr.off{background:var(--s2);border:1px solid var(--bd2);color:var(--t3)}
.iindr .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.iindr.on .dot{background:var(--ag)}
.iindr.off .dot{background:var(--bd)}

/* Build Modal */
.bfor{font-size:12px;color:var(--t2);padding:9px 12px;
  background:var(--s2);border:1px solid var(--bd2);border-radius:10px;margin-bottom:12px}
.bfor strong{color:var(--t1);font-size:13px}
.blist{display:flex;flex-direction:column;gap:7px}
.brow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  padding:11px 13px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px}
.brow-l{flex:1;min-width:0}
.brow-n{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
.brow-s{font-size:10px;color:var(--t3)}
.bbtn{padding:8px 14px;border-radius:8px;font-family:inherit;font-size:11px;
  font-weight:700;cursor:pointer;border:none;transition:all .2s;
  letter-spacing:.5px;white-space:nowrap;flex-shrink:0;align-self:center}
.bbtn.c{background:linear-gradient(135deg,var(--uc),var(--uc2));color:#fff;
  box-shadow:0 3px 10px rgba(59,130,246,.22)}
.bbtn.c:active{transform:scale(.97)}
.bbtn.d{background:rgba(16,185,129,.07);color:var(--ag);
  border:1px solid rgba(16,185,129,.18);cursor:default}
.bbtn.l{background:rgba(239,68,68,.07);color:rgba(239,68,68,.5);
  border:1px solid rgba(239,68,68,.12);cursor:default}

/* Dev Modal */
.dsname{font-size:18px;font-weight:900;color:var(--t1);margin-bottom:3px}
.dsub{font-size:12px;color:var(--t2);margin-bottom:20px}
.dcnt{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:8px}
.dbn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  font-size:28px;font-family:inherit;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.dbn-m{background:rgba(239,68,68,.1);color:var(--ar);border:2px solid rgba(239,68,68,.22)}
.dbn-m:active{background:rgba(239,68,68,.2)}
.dbn-p{background:rgba(16,185,129,.1);color:var(--ag);border:2px solid rgba(16,185,129,.22)}
.dbn-p:active{background:rgba(16,185,129,.2)}
.dbn:disabled{opacity:.25;cursor:not-allowed}
.dval{font-size:46px;font-weight:900;color:var(--t1);min-width:64px;text-align:center;line-height:1}
.dhint{font-size:11px;color:var(--t3);text-align:center;margin-bottom:18px}
.dfoot{display:flex;gap:8px}
.drm{flex:1;padding:12px;background:rgba(239,68,68,.07);
  border:1px solid rgba(239,68,68,.18);color:var(--ar);
  border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:.5px;transition:background .2s}
.drm:active{background:rgba(239,68,68,.14)}
.dok{flex:2;padding:12px;background:linear-gradient(135deg,#7c3aed,#a855f7);
  border:none;color:#fff;border-radius:10px;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:1px;box-shadow:0 4px 14px rgba(168,85,247,.25);transition:all .2s}
.dok:active{transform:scale(.98)}
</style>
</head>
<body>

<div id="LOV" class="on"><div class="spin"></div><div class="ltxt" id="LOV_TXT">読込中...</div></div>
<div class="toast" id="TOAST"></div>

<!-- Header -->
<div class="hdr">
  <button class="hdr-back" onclick="history.back()">← 戻る</button>
  <div class="hdr-flag" id="H_FLAG"></div>
  <div class="hdr-info">
    <div class="hdr-sub">ステート政策</div>
    <div class="hdr-nation" id="H_NAME">--</div>
  </div>
  <div class="hdr-r">
    <button class="hdr-sm" onclick="resetView()">リセット</button>
    <button class="hdr-sm" onclick="reloadData()">再読込</button>
  </div>
</div>

<!-- Mode Banner -->
<div id="MODE_BANNER">
  <div class="mb-dot" id="MB_DOT"></div>
  <span class="mb-lbl" id="MB_LBL">情報</span>
  <span class="mb-hint" id="MB_HINT">タップして情報確認</span>
  <div class="mb-leg" id="MB_LEG"></div>
</div>

<!-- Map -->
<div id="MVP">
  <div id="MT">
    <!--
    ════════════════════════════════════════════════════
    ★ ここにSVGコードを貼り付けてください ★
       各 <path> に id="ステート名" か
       <title>ステート名</title> が必要です
    ════════════════════════════════════════════════════
    -->
    <svg viewBox="0 0 400 200" style="width:800px;height:400px;background:#060a10">
      <rect width="400" height="200" fill="#060a10"/>
      <text x="50%" y="44%" text-anchor="middle" fill="#2e4260" font-size="14" font-family="monospace">ここにSVGを貼り付けてください</text>
      <text x="50%" y="62%" text-anchor="middle" fill="#1e2d45" font-size="10" font-family="monospace">&lt;!-- SVG CODE HERE --&gt;</text>
    </svg>
  </div>
</div>

<!-- Selection Bar -->
<div id="SEL_BAR">
  <div class="sel-inner">
    <div class="sel-top">
      <span class="sel-lbl" id="SEL_LBL">--</span>
      <span class="sel-bdg" id="SEL_BDG">0件</span>
    </div>
    <div class="sel-chips" id="SEL_CHIPS"></div>
    <div class="sel-acts">
      <button class="sbtn sbtn-cl" onclick="clearSel()">クリア</button>
      <button class="sbtn sbtn-ok" id="SEL_OK" onclick="doSubmit()">実行する</button>
    </div>
  </div>
</div>

<!-- Mode Bar (7 modes now including 建設・港) -->
<div id="MODE_BAR">
  <button class="mbn active" id="MB0" onclick="setMode(0)">
    <div class="mbn-ico" style="border:2px solid currentColor;border-radius:50%">
      <div style="position:absolute;width:2px;height:8px;background:currentColor;left:9px;top:5px;border-radius:1px"></div>
      <div style="position:absolute;width:4px;height:2px;background:currentColor;left:8px;top:2px;border-radius:1px"></div>
    </div>
    <span>情報</span>
  </button>
  <button class="mbn" id="MB1" onclick="setMode(1)">
    <div class="mbn-ico" style="display:flex;align-items:flex-end;gap:2px;padding:2px">
      <div style="width:4px;border-radius:1px 1px 0 0;background:currentColor;height:12px"></div>
      <div style="width:4px;border-radius:1px 1px 0 0;background:currentColor;height:7px"></div>
      <div style="width:4px;border-radius:1px 1px 0 0;background:currentColor;height:15px"></div>
      <div style="width:4px;border-radius:1px 1px 0 0;background:currentColor;height:5px"></div>
    </div>
    <span>経済</span>
  </button>
  <button class="mbn" id="MB2" onclick="setMode(2)">
    <div class="mbn-ico" style="border:2px solid currentColor;border-radius:2px">
      <div style="position:absolute;left:2px;right:2px;top:3px;height:2px;background:currentColor;border-radius:1px;box-shadow:0 4px 0 currentColor,0 8px 0 currentColor"></div>
    </div>
    <span>内政</span>
  </button>
  <button class="mbn" id="MB3" onclick="setMode(3)">
    <div class="mbn-ico">
      <div style="position:absolute;inset:1px;border:2px solid currentColor;border-radius:2px"></div>
      <div style="position:absolute;top:5px;left:5px;width:10px;height:10px;background:currentColor;border-radius:1px;opacity:.6"></div>
    </div>
    <span>開発</span>
  </button>
  <button class="mbn" id="MB4" onclick="setMode(4)">
    <div class="mbn-ico">
      <div style="position:absolute;inset:1px;border:2px solid currentColor;clip-path:polygon(50% 0%,100% 20%,100% 60%,50% 100%,0% 60%,0% 20%)"></div>
    </div>
    <span>弾圧</span>
  </button>
  <button class="mbn" id="MB5" onclick="setMode(5)">
    <div class="mbn-ico">
      <div style="position:absolute;bottom:0;left:1px;right:1px;height:12px;background:currentColor;border-radius:1px 1px 0 0;opacity:.9"></div>
      <div style="position:absolute;bottom:3px;left:8px;width:5px;height:8px;background:var(--bg);border-radius:1px 1px 0 0"></div>
    </div>
    <span>産業建設</span>
  </button>
  <button class="mbn" id="MB6" onclick="setMode(6)">
    <div class="mbn-ico">
      <div style="position:absolute;bottom:1px;left:0;right:0;height:6px;background:currentColor;border-radius:1px;opacity:.7"></div>
      <div style="position:absolute;bottom:7px;left:3px;width:14px;height:8px;border:2px solid currentColor;border-bottom:none;border-radius:3px 3px 0 0"></div>
    </div>
    <span>港建設</span>
  </button>
</div>

<!-- Info Modal -->
<div class="mover" id="M_INFO" onclick="if(event.target===this)mc('M_INFO')">
  <div class="modal">
    <div class="m-hd"><div class="m-hbar"></div></div>
    <div class="m-header"><div class="m-ttl" id="I_TTL">--</div>
      <button class="m-cls" onclick="mc('M_INFO')">X</button></div>
    <div class="m-body" id="I_BODY"></div>
  </div>
</div>

<!-- Build Modal (産業) -->
<div class="mover" id="M_BUILD" onclick="if(event.target===this)mc('M_BUILD')">
  <div class="modal">
    <div class="m-hd"><div class="m-hbar"></div></div>
    <div class="m-header"><div class="m-ttl">産業建設</div>
      <button class="m-cls" onclick="mc('M_BUILD')">X</button></div>
    <div class="m-body">
      <div class="bfor" id="B_FOR"></div>
      <div class="blist" id="B_LIST"></div>
    </div>
  </div>
</div>

<!-- Port Modal -->
<div class="mover" id="M_PORT" onclick="if(event.target===this)mc('M_PORT')">
  <div class="modal">
    <div class="m-hd"><div class="m-hbar"></div></div>

<div class="mover" id="M_DEV" onclick="if(event.target===this)mc('M_DEV')">

        <button class="dbn dbn-p" id="D_P" onclick="adjDev(1)">+</button>

<script>
// ════════════════════════════════════════════════════
//  設定
// ════════════════════════════════════════════════════
var GAS_URL = ''; // ← state_Code.gsのデプロイURLを入れる
// 例: 'https://script.google.com/macros/s/AKfy.../exec'

var LS_URL = 'state_gas_url';
var LS_SES = 'home_session';

// 産業定義 (BG-BL, index 0-5)
var IND_NAMES     = ['金属鉱山','鉱物資源鉱山','食料資源','燃料資源','民需工場','軍需工場'];
var IND_HAS_LIMIT = [true,true,true,true,false,false];

// モード定義 (0-6)
var MDEF = [
  {name:'情報',   hint:'任意のステートをタップして詳細確認',   col:'#3b82f6', action:''},
  {name:'経済政策',hint:'自国ステートを選択して実行',           col:'#10b981', action:'経済政策'},
  {name:'内政',   hint:'自国ステートを選択して実行',           col:'#f59e0b', action:'内政'},
  {name:'開発',   hint:'自国ステートをタップして本日の開発スロットを設定', col:'#a855f7', action:'開発'},
  {name:'弾圧',   hint:'軍事10以上の自国ステートを選択',       col:'#ef4444', action:'弾圧'},
  {name:'産業建設',hint:'自国ステートをタップして産業を建設',  col:'#f97316', action:''},
  {name:'港建設', hint:'港のない自国ステートをタップして建設', col:'#06b6d4', action:''}
];

// 状態変数
var SESSION = null, DATA = null;
var pathMap = {}, stateMap = {};
var MODE=0, SEL={}, DEV={};
var devEditNk=null, devEditCnt=1;
var buildNk=null, buildS=null, portNk=null, portS=null;
var tfm={x:0,y:0,s:1};
var TC={n:0,sx:0,sy:0,ptx:0,pty:0,pd:0,ps:0,mx:0,my:0,moved:false};
var MC={dn:false,sx:0,sy:0,ptx:0,pty:0,moved:false};

// ════════════════════════════════════════════════════
//  起動
// ════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function(){
  var sv=localStorage.getItem(LS_URL); if(sv) GAS_URL=sv;
  try{var s=sessionStorage.getItem(LS_SES);if(s)SESSION=JSON.parse(s);}catch(e){}
  if(!SESSION){
    hideLoading();toast('home.htmlからログインしてください','er');
    setTimeout(function(){location.href='home.html';},2000); return;
  }
  var c=SESSION.color||'#3b82f6';
  document.getElementById('H_NAME').textContent=SESSION.country;
  document.getElementById('H_FLAG').style.cssText='background:'+c+';box-shadow:0 0 10px '+c;
  setCSSVar('--uc',c); setCSSVar('--uc2',darken(c,.28));
  applyModeUI();
  if(!GAS_URL){hideLoading();toast('GAS URLを設定してください','er');return;}
  loadData();
});

function setCSSVar(k,v){document.documentElement.style.setProperty(k,v);}

// ════════════════════════════════════════════════════
//  データ取得
// ════════════════════════════════════════════════════
function loadData(){
  showLoading('データ取得中...');
  fetch(GAS_URL+'?action=getStatesData&country='+encodeURIComponent(SESSION.country))
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();
      if(!d||!d.success){toast(d?d.error:'取得失敗','er');return;}
      DATA=d; stateMap={}; pathMap={};
      (d.states||[]).forEach(function(s){stateMap[s.name.toLowerCase()]=s;});
      initSVG();
      toast('データ読込完了','ok');
    })
    .catch(function(e){hideLoading();toast('通信エラー: '+e,'er');});
}
function reloadData(){clearSel();loadData();}

// ════════════════════════════════════════════════════
//  SVG初期化
// ════════════════════════════════════════════════════
function initSVG(){
  document.querySelectorAll('#MT path').forEach(function(el){
    var n=pname(el); if(!n) return;
    var nk=n.toLowerCase();
    if(!pathMap[nk]) pathMap[nk]=[];
    pathMap[nk].push(el);
  });
  applyMap();
  setupTouch();
  resetView();
}

// SVGパスからステート名を取得
function pname(el){
  var cur=el, lim=8;
  while(cur&&lim-->0){
    if(!cur||cur.id==='MT'||cur.id==='MVP') break;
    if(cur.tagName&&cur.tagName.toLowerCase()==='svg') break;
    if(cur.querySelector){
      var t=cur.querySelector(':scope > title');
      if(t&&t.textContent&&t.textContent.trim()) return t.textContent.trim();
    }
    var dn=cur.getAttribute&&cur.getAttribute('data-name');
    if(dn&&dn.trim()) return dn.trim();
    var id=cur.id;
    if(id&&id.trim()&&!/^(map|wrapper|map-group|MT|MVP|svg\d*)$/i.test(id)) return id;
    cur=cur.parentElement;
  }
  return null;
}

// ════════════════════════════════════════════════════
//  マップ描画
// ════════════════════════════════════════════════════
function applyMap(){
  if(!DATA) return;
  var states=DATA.states;

  // グラデーション用 min/max
  var econVals=states.map(function(s){return s.econVal;});
  var domVals =states.map(function(s){return s.domVal;});
  var indVals =states.map(function(s){return s.indGrad;});
  var devVals =states.map(function(s){return s.devDisp;});
  var eMn=Math.min.apply(null,econVals), eMx=Math.max.apply(null,econVals);
  var dMn=0, dMx=100;  // 統治レベルは固定 0-100
  var iMn=Math.min.apply(null,indVals),  iMx=Math.max.apply(null,indVals);
  var vMn=Math.min.apply(null,devVals),  vMx=Math.max.apply(null,devVals);

  states.forEach(function(s){
    var paths=pathMap[s.name.toLowerCase()];
    if(!paths||!paths.length) return;
    var nk=s.name.toLowerCase();

    // ── 塗り色 ──
    var fill;
    switch(MODE){
      case 1: fill=triGrad(s.econVal,eMn,eMx); break;
      case 2: fill=triGrad(s.domVal, dMn,dMx); break;
      case 3: fill=triGrad(s.devDisp,vMn,vMx); break;
      case 5: fill=triGrad(s.indGrad,iMn,iMx); break;
      default:fill=s.color;
    }

    // ── 枠線（スプレッドシートの既存フラグ） ──
    // 選択UI の状態が上書きするため、後で上書き
    var stroke='#222e40', sw='0.5';
    switch(MODE){
      case 1: // 経済: BC=1 → 黄色太枠
        if(s.econFlag===1){stroke='#f59e0b';sw='3';}
        break;
      case 2: // 内政: BD=1 → 黄色太枠
        if(s.domFlag===1){stroke='#f59e0b';sw='3';}
        break;
      case 3: // 開発: BE 1-9→緑, 10→黄色
        if(s.devSlot>=1&&s.devSlot<=9){stroke='#10b981';sw='3';}
        else if(s.devSlot>=10){stroke='#f59e0b';sw='3';}
        break;
      case 4: // 弾圧: BF=1 → 赤太枠
        if(s.suppFlag===1){stroke='#ef4444';sw='3';}
        break;
      case 5: case 6: // 産業/港: 既設あり → 黄色太枠
        var hasInd=s.industries.some(function(v){return v===1;});
        if(hasInd){stroke='#f59e0b';sw='3';}
        if(MODE===6&&s.port===1){stroke='#06b6d4';sw='3';}
        break;
    }

    // ── UI選択状態（スプレッドシートフラグより優先） ──
    // 選択中・済みはモード別に色分け
    if(MODE===3){
      // 開発モード
      var devCnt=DEV[nk]||0;
      if(devCnt>0&&devCnt<10){stroke='#10b981';sw='3.5';} // 選択済み→緑
      else if(devCnt>=10)    {stroke='#f59e0b';sw='3.5';} // 10スロット→黄色
    } else {
      // その他モード：選択済み→黄色
      if(SEL[nk]){stroke='#f59e0b';sw='3.5';}
    }

    // ── 透明度・ポインタ ──
    var opacity='1', pe='auto', cur2='pointer';
    if(MODE===1||MODE===2||MODE===3||MODE===5){
      if(!s.isOwned){opacity='.25';pe='none';cur2='default';}
    }
    if(MODE===4){
      if(!s.isOwned){opacity='.18';pe='none';cur2='default';}
      else if(s.military<10){opacity='.4';cur2='not-allowed';}
    }
    if(MODE===6){
      if(!s.isOwned){opacity='.25';pe='none';cur2='default';}
      else if(s.port===1){opacity='.45';cur2='default';}
    }

    paths.forEach(function(p){
      p.setAttribute('fill',fill);
      p.setAttribute('stroke',stroke);
      p.setAttribute('stroke-width',sw);
      p.style.opacity=opacity;
      p.style.pointerEvents=pe;
      p.style.cursor=cur2;
    });
  });
}

// 3色グラデーション: 全同値→黄, 低→赤, 中→黄, 高→緑
function triGrad(val,mn,mx){
  if(mx<=mn) return '#8a7200'; // 全同値=黄系
  var t=Math.max(0,Math.min(1,(val-mn)/(mx-mn)));
  if(t<0.5) return lerpHex('#7a2020','#8a7200',t*2);
  return lerpHex('#8a7200','#1a6e3c',(t-0.5)*2);
}
function lerpHex(a,b,t){
  var ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  var br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  var r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bv=Math.round(ab+(bb-ab)*t);
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(bv<16?'0':'')+bv.toString(16);
}

// ════════════════════════════════════════════════════
//  タッチ / マウス
// ════════════════════════════════════════════════════
function setupTouch(){
  var vp=document.getElementById('MVP');
  vp.addEventListener('touchstart', onTS,{passive:false});
  vp.addEventListener('touchmove',  onTM,{passive:false});
  vp.addEventListener('touchend',   onTE,{passive:false});
  vp.addEventListener('touchcancel',function(){TC.n=0;},{passive:false});
  vp.addEventListener('mousedown', onMD);
  vp.addEventListener('mousemove', onMV);
  vp.addEventListener('mouseup',   onMU);
  vp.addEventListener('mouseleave',function(){MC.dn=false;});
  vp.addEventListener('wheel',     onWH,{passive:false});
}
function onTS(e){
  e.preventDefault();TC.moved=false;TC.n=e.touches.length;
  if(TC.n===1){TC.sx=e.touches[0].clientX;TC.sy=e.touches[0].clientY;TC.ptx=tfm.x;TC.pty=tfm.y;}
  else if(TC.n>=2){
    TC.pd=pdist(e.touches);TC.ps=tfm.s;TC.ptx=tfm.x;TC.pty=tfm.y;
    TC.mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    TC.my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    TC.moved=true;
  }
}
function onTM(e){
  e.preventDefault();
  if(TC.n===1&&e.touches.length===1){
    var dx=e.touches[0].clientX-TC.sx,dy=e.touches[0].clientY-TC.sy;
    if(Math.abs(dx)>6||Math.abs(dy)>6)TC.moved=true;
    if(TC.moved){tfm.x=TC.ptx+dx;tfm.y=TC.pty+dy;applyTfm();}
  } else if(e.touches.length>=2){
    var d=pdist(e.touches),ns=clamp(TC.ps*(d/TC.pd),0.1,18),r=ns/TC.ps;
    tfm.x=TC.mx+r*(TC.ptx-TC.mx);tfm.y=TC.my+r*(TC.pty-TC.my);tfm.s=ns;applyTfm();
  }
}
function onTE(e){if(!TC.moved&&TC.n===1){onTap(document.elementFromPoint(TC.sx,TC.sy));}TC.n=e.touches.length;}
function onMD(e){if(e.button!==0)return;MC.dn=true;MC.sx=e.clientX;MC.sy=e.clientY;MC.ptx=tfm.x;MC.pty=tfm.y;MC.moved=false;}
function onMV(e){if(!MC.dn)return;var dx=e.clientX-MC.sx,dy=e.clientY-MC.sy;if(Math.abs(dx)>5||Math.abs(dy)>5)MC.moved=true;if(MC.moved){tfm.x=MC.ptx+dx;tfm.y=MC.pty+dy;applyTfm();}}
function onMU(e){if(!MC.moved)onTap(e.target);MC.dn=false;}
function onWH(e){
  e.preventDefault();
  var f=e.deltaY>0?.87:1.15,ns=clamp(tfm.s*f,0.1,18),r=ns/tfm.s;
  tfm.x=e.clientX+r*(tfm.x-e.clientX);tfm.y=e.clientY+r*(tfm.y-e.clientY);tfm.s=ns;applyTfm();
}
function applyTfm(){document.getElementById('MT').style.transform='translate('+tfm.x+'px,'+tfm.y+'px) scale('+tfm.s+')';}
function pdist(ts){var dx=ts[0].clientX-ts[1].clientX,dy=ts[0].clientY-ts[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function resetView(){
  tfm={x:0,y:0,s:1};
  var mt=document.getElementById('MT'),vp=document.getElementById('MVP'),svg=mt.querySelector('svg');
  if(svg){
    var sw=parseFloat(svg.style.width||'800');
    var sh=parseFloat(svg.style.height||'400');
    var ns=Math.min(vp.clientWidth/sw,vp.clientHeight/sh)*0.96;
    tfm.s=Math.max(0.1,ns);
  }
  applyTfm();
}

// ════════════════════════════════════════════════════
//  タップ処理
// ════════════════════════════════════════════════════
function onTap(el){
  if(!DATA||!el) return;
  var cur=el,n=null;
  while(cur&&cur.id!=='MT'){n=pname(cur);if(n)break;cur=cur.parentElement;}
  if(!n) return;
  var nk=n.toLowerCase(),s=stateMap[nk];
  if(!s) return;
  switch(MODE){
    case 0: openInfo(s); break;        // 情報: 全ステート OK
    case 1: case 2: toggleSel(nk,s); break;
    case 3: openDev(nk,s); break;
    case 4: toggleSupp(nk,s); break;
    case 5: openBuild(nk,s); break;
    case 6: openPort(nk,s); break;
  }
}

// ════════════════════════════════════════════════════
//  モード
// ════════════════════════════════════════════════════
function setMode(m){
  clearSel();MODE=m;
  for(var i=0;i<7;i++){var b=document.getElementById('MB'+i);if(!b)continue;b.classList.toggle('active',i===m);b.style.color='';b.style.borderTopColor='';}
  var c=MDEF[m].col;
  var ab=document.getElementById('MB'+m);
  if(ab){ab.style.color=c;ab.style.borderTopColor=c;}
  setCSSVar('--uc',c);setCSSVar('--uc2',darken(c,.28));
  applyModeUI();applyMap();
}

function applyModeUI(){
  var md=MDEF[MODE],c=md.col;
  var dot=document.getElementById('MB_DOT');
  dot.style.background=c;dot.style.color=c;
  document.getElementById('MB_LBL').textContent=md.name;
  document.getElementById('MB_LBL').style.color=c;
  document.getElementById('MB_HINT').textContent=md.hint;
  // 凡例
  var leg=document.getElementById('MB_LEG');leg.innerHTML='';
  var legends=getLegend(MODE);
  legends.forEach(function(l){
    var d=document.createElement('div');d.className='lg-item';
    d.innerHTML='<div class="'+(l.fill?'lg-b':'lg-r')+'" style="'+(l.fill?'background':'border-color')+':'+l.col+'"></div><span>'+l.txt+'</span>';
    leg.appendChild(d);
  });
}

function getLegend(m){
  switch(m){
    case 1: return[{fill:true,col:'#7a2020',txt:'低'},{fill:true,col:'#8a7200',txt:'中'},{fill:true,col:'#1a6e3c',txt:'高'},{fill:false,col:'#f59e0b',txt:'実行中'}];
    case 2: return[{fill:true,col:'#7a2020',txt:'低'},{fill:true,col:'#8a7200',txt:'中'},{fill:true,col:'#1a6e3c',txt:'高'},{fill:false,col:'#f59e0b',txt:'実行中'}];
    case 3: return[{fill:false,col:'#10b981',txt:'開発1-9'},{fill:false,col:'#f59e0b',txt:'開発10(本日Max)'},{fill:false,col:'#10b981',txt:'選択済(緑)'},{fill:false,col:'#f59e0b',txt:'10スロット済'}];
    case 4: return[{fill:false,col:'#ef4444',txt:'弾圧中'}];
    case 5: return[{fill:true,col:'#7a2020',txt:'低'},{fill:true,col:'#1a6e3c',txt:'高'},{fill:false,col:'#f59e0b',txt:'産業あり'}];
    case 6: return[{fill:false,col:'#06b6d4',txt:'港あり'}];
    default:return[];
  }
}

// ════════════════════════════════════════════════════
//  選択操作
// ════════════════════════════════════════════════════
function toggleSel(nk,s){
  if(!s.isOwned){toast('自国ステートのみ選択可','wa');return;}
  if(SEL[nk])delete SEL[nk]; else SEL[nk]=true;
  applyMap();updateSelBar();
}
function toggleSupp(nk,s){
  if(!s.isOwned){toast('自国ステートのみ選択可','wa');return;}
  if(s.military<10){toast('駐留軍事が10未満です (現在: '+s.military+')','wa');return;}
  if(SEL[nk])delete SEL[nk]; else SEL[nk]=true;
  applyMap();updateSelBar();
}
function clearSel(){SEL={};DEV={};applyMap();updateSelBar();}
function removeChip(nk){delete SEL[nk];delete DEV[nk];applyMap();updateSelBar();}

function updateSelBar(){
  var bar=document.getElementById('SEL_BAR');
  var md=MDEF[MODE];
  var keys,total;
  if(MODE===3){keys=Object.keys(DEV);total=keys.reduce(function(a,k){return a+DEV[k];},0);}
  else{keys=Object.keys(SEL);total=keys.length;}
  var show=(MODE>=1&&MODE<=4&&keys.length>0);
  bar.classList.toggle('on',show);
  if(!show) return;
  var c=md.col;
  document.getElementById('SEL_LBL').textContent=md.name;
  document.getElementById('SEL_LBL').style.color=c;
  document.getElementById('SEL_BDG').textContent=MODE===3?'合計'+total+'スロット':total+'件';
  document.getElementById('SEL_BDG').style.color=c;
  var ok=document.getElementById('SEL_OK');
  ok.style.background='linear-gradient(135deg,'+c+','+darken(c,.28)+')';
  var chips=document.getElementById('SEL_CHIPS');
  chips.innerHTML='';
  keys.forEach(function(nk){
    var s=stateMap[nk];var nm=s?s.name:nk;
    var cnt=MODE===3?DEV[nk]:null;
    var ch=document.createElement('div');ch.className='sel-chip';
    ch.style.borderColor=c+'44';
    ch.innerHTML=(cnt?'<span class="sel-chip-n">x'+cnt+'</span>':'')+
      '<span>'+esc(nm)+'</span>'+
      '<button class="sel-chip-x" onclick="removeChip(\''+escj(nk)+'\')">x</button>';
    chips.appendChild(ch);
  });
}

// ════════════════════════════════════════════════════
//  アクション送信
// ════════════════════════════════════════════════════
function doSubmit(){
  if(!SESSION) return;
  var md=MDEF[MODE]; if(!md.action) return;
  var data,label;
  if(MODE===3){
    var keys=Object.keys(DEV); if(!keys.length){toast('ステートを選択してください','wa');return;}
    var obj={};
    keys.forEach(function(nk){obj[stateMap[nk]?stateMap[nk].name:nk]=DEV[nk];});
    data=obj;label=Object.keys(obj).join(', ');
  } else {
    var keys=Object.keys(SEL); if(!keys.length){toast('ステートを選択してください','wa');return;}
    data=keys.map(function(nk){return stateMap[nk]?stateMap[nk].name:nk;});
    label=data.join(', ');
  }
  if(!confirm(md.name+'を実行しますか？\n対象: '+label)) return;
  var btn=document.getElementById('SEL_OK');
  btn.disabled=true;btn.textContent='送信中...';
  showLoading('送信中...');
  var url=GAS_URL+'?action=submitAction'+
    '&country='+encodeURIComponent(SESSION.country)+
    '&actionType='+encodeURIComponent(md.action)+
    '&data='+encodeURIComponent(JSON.stringify(data));
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      hideLoading();btn.disabled=false;btn.textContent='実行する';
      if(d&&d.success){
        toast(md.name+'を記録しました ('+d.updated+'件)','ok');
        clearSel();reloadData();
      } else toast(d?d.error:'送信エラー','er');
    })
    .catch(function(e){hideLoading();btn.disabled=false;btn.textContent='実行する';toast('通信エラー: '+e,'er');});
}

// ════════════════════════════════════════════════════
//  情報モーダル（全ステート表示可）
// ════════════════════════════════════════════════════
function openInfo(s){
  document.getElementById('I_TTL').textContent=s.name;
  var h='';
  // 国家ヘッダー
  h+='<div class="ih"><div class="ih-dot" style="background:'+esc(s.color)+';box-shadow:0 0 8px '+esc(s.color)+'"></div>'+
    '<span class="ih-cnt">'+(s.country||'未所属')+'</span>'+
    '<span class="ih-own '+(s.isOwned?'o':'t')+'">'+(s.isOwned?'自国':'他国')+'</span></div>';
  // フラグチップ
  h+='<div class="ic">';
  if(s.econFlag===1) h+='<span class="ict ec">経済政策中</span>';
  if(s.domFlag===1)  h+='<span class="ict do">内政中</span>';
  if(s.suppFlag===1) h+='<span class="ict sp">弾圧中</span>';
  var devCls=s.devSlot===0?'d0':s.devSlot>=10?'dy':'dg';
  h+='<span class="ict '+devCls+'">本日開発: '+s.devSlot+'/10</span>';
  h+='<span class="ict d0">開発度: '+s.devDisp+'</span>';
  h+='<span class="ict d0">軍事: '+s.military+'</span>';
  if(s.port===1) h+='<span class="ict pt">港あり</span>';
  h+='</div>';
  // 表示情報 A-L
  if(DATA&&DATA.dispHdrs){
    h+='<div class="isec">基本情報</div><div class="igrid">';
    for(var j=0;j<DATA.dispHdrs.length;j++){
      var lbl=DATA.dispHdrs[j],val=s.disp[j]||'--';
      if(!lbl&&(!val||val==='--')) continue;
      h+='<div class="igc"><div class="igc-l">'+esc(lbl||'--')+'</div><div class="igc-v">'+esc(val)+'</div></div>';
    }
    h+='</div>';
  }
  // 産業状況
  h+='<div class="isec">産業建設状況</div><div class="iind">';
  IND_NAMES.forEach(function(nm,i){
    var on=s.industries[i]===1;
    h+='<div class="iindr '+(on?'on':'off')+'"><div class="dot"></div>'+esc(nm)+'</div>';
  });
  h+='</div>';
  document.getElementById('I_BODY').innerHTML=h;
  mo('M_INFO');
}

// ════════════════════════════════════════════════════
//  産業建設モーダル（建設限界は非表示）
// ════════════════════════════════════════════════════
function openBuild(nk,s){
  if(!s.isOwned){toast('自国ステートのみ建設可','wa');return;}
  buildNk=nk;buildS=s;
  document.getElementById('B_FOR').innerHTML='<strong>'+esc(s.name)+'</strong> への産業建設';
  var list=document.getElementById('B_LIST');list.innerHTML='';
  IND_NAMES.forEach(function(nm,i){
    var isBuilt=s.industries[i]===1;
    var overLimit=false;
    if(IND_HAS_LIMIT[i]&&!isBuilt){
      var cur=s.indCur[i]||0,lim=s.indLim[i]||0;
      overLimit=(lim>0&&cur>=lim);
    }
    var row=document.createElement('div');row.className='brow';
    var subTxt=isBuilt?'建設済':overLimit?'建設不可':'建設可能';
    var btnHtml;
    if(isBuilt)     btnHtml='<button class="bbtn d">建設済</button>';
    else if(overLimit) btnHtml='<button class="bbtn l">建設不可</button>';
    else btnHtml='<button class="bbtn c" onclick="doBuild('+i+')">建設する</button>';
    row.innerHTML='<div class="brow-l"><div class="brow-n">'+esc(nm)+'</div>'+
      '<div class="brow-s">'+esc(subTxt)+'</div></div>'+btnHtml;
    list.appendChild(row);
  });
  mo('M_BUILD');
}

function doBuild(indIdx){
  if(!buildS||!SESSION) return;
  if(!confirm(buildS.name+'に「'+IND_NAMES[indIdx]+'」を建設しますか？')) return;
  mc('M_BUILD');showLoading('建設中...');
  var url=GAS_URL+'?action=buildItem&buildType=industry'+
    '&country='+encodeURIComponent(SESSION.country)+
    '&stateName='+encodeURIComponent(buildS.name)+
    '&indIdx='+indIdx;
  fetch(url).then(function(r){return r.json();}).then(function(d){
    hideLoading();
    if(d&&d.success){buildS.industries[indIdx]=1;applyMap();toast(d.message||'建設完了','ok');}
    else toast(d?d.error:'建設エラー','er');
  }).catch(function(e){hideLoading();toast('通信エラー: '+e,'er');});
}

// ════════════════════════════════════════════════════
//  港建設モーダル
// ════════════════════════════════════════════════════
function openPort(nk,s){
  if(!s.isOwned){toast('自国ステートのみ建設可','wa');return;}
  portNk=nk;portS=s;
  var h='<div class="ih" style="margin-bottom:14px">'+
    '<div class="ih-dot" style="background:'+esc(s.color)+';box-shadow:0 0 8px '+esc(s.color)+'"></div>'+
    '<span class="ih-cnt">'+esc(s.name)+'</span></div>';
  if(s.port===1){
    h+='<div style="text-align:center;padding:24px;color:var(--ag);font-size:15px;font-weight:700">このステートには既に港があります</div>';
  } else {
    h+='<div style="padding:14px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;margin-bottom:16px;font-size:13px;color:var(--t2);line-height:1.7">'+
      '港を建設するとこのステートへの海上輸送が可能になります。<br>建設は一度行うと取り消せません。</div>'+
      '<button onclick="doPort()" style="width:100%;padding:14px;background:linear-gradient(135deg,#0891b2,#06b6d4);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 14px rgba(6,182,212,.28)">港を建設する</button>';
  }
  document.getElementById('PORT_BODY').innerHTML=h;
  mo('M_PORT');
}

function doPort(){
  if(!portS||!SESSION) return;
  if(!confirm(portS.name+'に港を建設しますか？')) return;
  mc('M_PORT');showLoading('建設中...');
  var url=GAS_URL+'?action=buildItem&buildType=port'+
    '&country='+encodeURIComponent(SESSION.country)+
    '&stateName='+encodeURIComponent(portS.name);
  fetch(url).then(function(r){return r.json();}).then(function(d){
    hideLoading();
    if(d&&d.success){portS.port=1;applyMap();toast(d.message||'港を建設しました','ok');}
    else toast(d?d.error:'建設エラー','er');
  }).catch(function(e){hideLoading();toast('通信エラー: '+e,'er');});
}

// ════════════════════════════════════════════════════
//  開発モーダル
// ════════════════════════════════════════════════════
function openDev(nk,s){
  if(!s.isOwned){toast('自国ステートのみ選択可','wa');return;}
  devEditNk=nk;devEditCnt=DEV[nk]||0;
  document.getElementById('D_NM').textContent=s.name;
  updDevUI();mo('M_DEV');
}
function adjDev(d){devEditCnt=clamp(devEditCnt+d,0,10);updDevUI();}
function updDevUI(){
  document.getElementById('D_V').textContent=devEditCnt;
  document.getElementById('D_H').textContent=devEditCnt+' / 10 スロット（本日）';
  document.getElementById('D_M').disabled=devEditCnt<=0;
  document.getElementById('D_P').disabled=devEditCnt>=10;
}
function devRm(){if(devEditNk){delete DEV[devEditNk];delete SEL[devEditNk];}mc('M_DEV');applyMap();updateSelBar();}
function devOK(){
  if(devEditNk){
    if(devEditCnt===0){delete DEV[devEditNk];delete SEL[devEditNk];}
    else DEV[devEditNk]=devEditCnt;
  }
  mc('M_DEV');applyMap();updateSelBar();
}

// ════════════════════════════════════════════════════
//  モーダル開閉
// ════════════════════════════════════════════════════
function mo(id){document.getElementById(id).classList.add('on');}
function mc(id){document.getElementById(id).classList.remove('on');}

// ════════════════════════════════════════════════════
//  ユーティリティ
// ════════════════════════════════════════════════════
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escj(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}
function darken(hex,a){
  hex=(hex||'#3b82f6').replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=Math.max(0,Math.round(parseInt(hex.substr(0,2),16)*(1-a)));
  var g=Math.max(0,Math.round(parseInt(hex.substr(2,2),16)*(1-a)));
  var b=Math.max(0,Math.round(parseInt(hex.substr(4,2),16)*(1-a)));
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}
function showLoading(t){document.getElementById('LOV_TXT').textContent=t||'読込中...';document.getElementById('LOV').classList.add('on');}
function hideLoading(){document.getElementById('LOV').classList.remove('on');}
var _tt;
function toast(msg,type){
  var el=document.getElementById('TOAST');
  el.textContent=msg;el.className='toast on '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='toast';},3500);
}
</script>
